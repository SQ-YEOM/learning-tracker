<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>학습 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Unbounded:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="tracker">
  <div class="background">
    <div class="orb orb--one"></div>
    <div class="orb orb--two"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <div class="brand__badge">LT</div>
      <div>
        <div class="brand__title">Learning Tracker</div>
        <div class="brand__subtitle">학습 현황 알리미</div>
      </div>
    </div>
  </header>

  <main class="tracker-main">
    <section class="search-card">
      <div>
        <h1>내 학습 현황 확인</h1>
        <p class="muted">학습 자료 및 프린트는 <a href="https://drive.google.com/drive/folders/1XCoSWiCYhYK1U7CzAEEGt70kAX0vdj5G?usp=sharing" target="_blank" style="text-decoration: underline;">구글 드라이브</a>에서 확인할 수 있습니다.</p>
      </div>
      <div class="search-input">
        <label for="studentSearch">이름</label>
        <input id="studentSearch" name="studentSearch" type="text" placeholder="예: 염승규" autocomplete="off" list="studentList" />
        <datalist id="studentList"></datalist>
        <p class="helper" id="searchHelper">이름을 입력하면 현재 교재 진도와 커리큘럼 단계가 보입니다.</p>
      </div>
    </section>

    <section class="tracker-content" id="trackerContent">
      <div class="empty-state">
        <h2>이름을 입력해주세요</h2>
        <p class="muted">이름을 입력하면 자동으로 학생 정보를 불러옵니다.</p>
      </div>
    </section>
  </main>

  <script src="store.js"></script>
  <script src="tracker.js"></script>
</body>
</html>
